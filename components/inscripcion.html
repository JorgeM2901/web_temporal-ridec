<link rel="stylesheet" href="./assets/css/inscripcion.css" />

<section class="registration-section container">
    <div class="form-container">
        <header class="form-header">
            <h1>Inscripción al Evento</h1>
            <p>Completa tus datos para participar y ayudarnos a mejorar nuestras actividades científicas.</p>
        </header>

        <form id="event-form" class="event-form">
            <fieldset>
                <legend>Información Básica</legend>
                <div class="form-group">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" name="nombre" required placeholder="Ej. Ana García">
                </div>
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" required placeholder="tu@email.com">
                </div>
            </fieldset>

            <fieldset>
                <legend>Perfil Académico y Demográfico</legend>
                <div class="grid-form">
                    <div class="form-group">
                        <label for="pais">País de Residencia</label>
                        <select id="pais" name="pais" required>
                            <option value="" disabled selected>Selecciona...</option>
                            <option value="peru">Perú</option>
                            <option value="mexico">México</option>
                            <option value="colombia">Colombia</option>
                            <option value="otros">Otros</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="genero">Género</label>
                        <select id="genero" name="genero">
                            <option value="femenino">Femenino</option>
                            <option value="masculino">Masculino</option>
                            <option value="no-binario">No binario</option>
                            <option value="preferible-no-decir">Prefiero no decir</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="ocupacion">Nivel Académico / Ocupación</label>
                    <select id="ocupacion" name="ocupacion" required>
                        <option value="pregrado">Estudiante de Pregrado</option>
                        <option value="posgrado">Estudiante de Posgrado (Mg/Phd)</option>
                        <option value="docente">Docente / Investigador</option>
                        <option value="profesional">Profesional Independiente</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="area">Área de Interés Principal</label>
                    <input type="text" id="area" name="area" placeholder="Ej. Psicología Experimental, IA, Bioinformática">
                </div>
            </fieldset>

            <fieldset>
                <legend>Intereses y Feedback</legend>
                <div class="form-group">
                    <label>¿Cómo te enteraste de este evento?</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" name="origen" value="instagram"> Instagram</label>
                        <label><input type="checkbox" name="origen" value="linkedin"> LinkedIn</label>
                        <label><input type="checkbox" name="origen" value="universidad"> Universidad</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="expectativa">¿Qué esperas aprender en esta jornada?</label>
                    <textarea id="expectativa" name="expectativa" rows="3" placeholder="Tus objetivos..."></textarea>
                </div>
            </fieldset>

            <div class="form-consent">
                <label class="checkbox-label">
                    <input type="checkbox" required name="consentimiento">
                    Acepto el tratamiento de mis datos para fines académicos y de investigación según la política de privacidad de RIdeC.
                </label>
            </div>

            <button type="submit" class="btn-submit">Confirmar Inscripción</button>
        </form>
    </div>
</section>

<script src="./assets/js/inscripcion.js"></script>
